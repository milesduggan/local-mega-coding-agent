name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Python syntax
        run: |
          python -m py_compile scripts/config.py
          python -m py_compile scripts/backend/wrapper.py
          python -m py_compile scripts/backend/model_manager.py
          python -m py_compile scripts/critic/critic.py
          python -m py_compile scripts/executor/executor.py
          python -m py_compile scripts/chunker/python_chunker.py
          python -m py_compile scripts/chunker/selector.py
          python -m py_compile scripts/chunker/reconstructor.py
          python -m py_compile scripts/memory/context_manager.py

  typescript-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-ai-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Compile TypeScript
        run: npm run compile
      - name: Run ESLint
        run: npm run lint
